<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MindAR Video AR</title>

  <!-- A-Frame and MindAR -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/aframe/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.2rem;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="loading" class="loading">Initializing camera…</div>

<a-scene 
  mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>
  <a-assets>
    <!-- Load your video -->
    <video id="arVideo" src="video.mp4" preload="auto" loop crossorigin="anonymous" playsinline webkit-playsinline></video>
  </a-assets>

  <!-- AR camera setup -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Your AR video appears when image target is found -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-video 
      src="#arVideo" 
      width="1.5" 
      height="0.9" 
      position="0 0 0"
      rotation="0 0 0"
    ></a-video>
  </a-entity>
</a-scene>

<script>
  // When MindAR is ready, start AR
  const scene = document.querySelector('a-scene');
  scene.addEventListener('renderstart', () => {
    document.getElementById('loading').style.display = 'none';
    scene.components['mindar-image'].start();
  });

  // Video play on target found
  const videoEl = document.getElementById('arVideo');
  scene.addEventListener('targetFound', () => {
    videoEl.play().catch(() => {});
  });
  scene.addEventListener('targetLost', () => {
    videoEl.pause();
  });
</script>

</body>
</html>
